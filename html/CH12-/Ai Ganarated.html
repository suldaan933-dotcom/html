<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldier Registration Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #fff;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #203a43;
      margin-bottom: 30px;
    }

    fieldset {
      border: 2px solid #2c5364;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
    }

    legend {
      background: #2c5364;
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2c5364;
      box-shadow: 0 0 10px rgba(44,83,100,0.3);
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .row .form-group {
      flex: 1;
    }

    .checkbox-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
    }

    .checkbox-group input {
      width: auto;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #203a43;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2c5364;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🪖 Soldier & Equipment Registration</h1>

    <form>

      <fieldset>
        <legend>Personal Information</legend>

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter full name">
        </div>

        <div class="row">
          <div class="form-group">
            <label for="service">Service Number</label>
            <input type="text" id="service" placeholder="e.g. MIL12345">
          </div>

          <div class="form-group">
            <label for="rank">Rank</label>
            <select id="rank">
              <option>Select Rank</option>
              <option>Private</option>
              <option>Corporal</option>
              <option>Sergeant</option>
              <option>Lieutenant</option>
              <option>Captain</option>
              <option>Major</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age">
          </div>

          <div class="form-group">
            <label for="unit">Unit</label>
            <input type="text" id="unit" placeholder="Unit Name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Military Email</label>
          <input type="email" id="email" placeholder="example@army.mil">
        </div>
      </fieldset>

      <fieldset>
        <legend>Equipment Information</legend>

        <div class="form-group">
          <label for="equipment">Primary Equipment</label>
          <select id="equipment">
            <option>Select Equipment</option>
            <option>Rifle</option>
            <option>Radio</option>
            <option>Night Vision</option>
            <option>Body Armor</option>
            <option>GPS Device</option>
          </select>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="serial">Serial Number</label>
            <input type="text" id="serial" placeholder="Equipment serial number">
          </div>

          <div class="form-group">
            <label for="condition">Condition</label>
            <select id="condition">
              <option>Excellent</option>
              <option>Good</option>
              <option>Fair</option>
              <option>Needs Repair</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Additional Equipment</label>

          <div class="checkbox-group">
            <label><input type="checkbox"> Helmet</label>
            <label><input type="checkbox"> Radio</label>
            <label><input type="checkbox"> GPS</label>
            <label><input type="checkbox"> First Aid Kit</label>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Assignment Details</legend>

        <div class="form-group">
          <label for="location">Deployment Location</label>
          <input type="text" id="location" placeholder="Enter location">
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="5" placeholder="Write any important notes..."></textarea>
        </div>
      </fieldset>

      <button type="submit">Register Soldier</button>

    </form>
  </div>

</body>
</html>
